<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>s1kr10s // CTF Challenges</title>
  <link rel="shortcut icon" href="../images/icon.png">
  <script src="./data.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --green: #00ff41;
      --green-dim: #00b32c;
      --green-dark: #003b0f;
      --cyan: #00ffff;
      --amber: #ffb000;
      --purple: #9d00ff;
      --bg: #000000;
      --scanline: rgba(0, 255, 65, 0.03);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      overflow-y: scroll;
    }

    html, body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* CRT scanlines */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        var(--scanline) 2px,
        var(--scanline) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* CRT vignette */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    canvas#matrixCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.07;
    }

    .wrapper {
      position: relative;
      z-index: 10;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* NAV */
    nav {
      border-bottom: 1px solid var(--green-dim);
      padding: 12px 0;
    }

    nav ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }

    nav ul li a {
      color: var(--green-dim);
      text-decoration: none;
      padding: 4px 12px;
      border: 1px solid transparent;
      font-size: 0.9rem;
      letter-spacing: 1px;
      transition: all 0.15s;
    }

    nav ul li a:hover,
    nav ul li a.active {
      color: var(--green);
      border-color: var(--green);
      text-shadow: 0 0 8px var(--green);
      background: rgba(0,255,65,0.05);
    }

    nav .brand {
      color: var(--green);
      font-size: 1rem;
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--green);
      margin-right: auto;
    }

    /* PAGE HEADER */
    .page-header {
      padding: 30px 0 5px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .prompt-line {
      color: var(--green);
      font-size: 1.05rem;
      margin-bottom: 25px;
      text-shadow: 0 0 5px var(--green);
    }

    .prompt-line .user { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
    .prompt-line .host { color: var(--green); }
    .prompt-line .path { color: var(--green-dim); }

    .cursor {
      display: inline-block;
      width: 9px;
      height: 1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 8px var(--green);
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin: 20px 0 30px;
      flex-wrap: wrap;
    }

    .filter-bar label {
      color: var(--cyan);
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-shadow: 0 0 6px var(--cyan);
    }

    .filter-bar select {
      background: #000;
      color: var(--green);
      border: 1px solid var(--green-dim);
      padding: 6px 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 200px;
    }

    .filter-bar select:hover,
    .filter-bar select:focus {
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(0,255,65,0.3);
      color: var(--green);
    }

    .filter-bar select option {
      background: #000;
      color: var(--green);
    }

    /* RESULTS */
    #results {
      margin-bottom: 40px;
    }

    #results h2 {
      color: var(--cyan);
      font-size: 0.85rem;
      letter-spacing: 3px;
      margin-bottom: 16px;
      text-align: center;
      text-shadow: 0 0 8px var(--cyan);
    }

    /* TABLE */
    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: transparent;
    }

    thead tr {
      border-bottom: 2px solid var(--green-dim);
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--cyan);
      text-shadow: 0 0 6px var(--cyan);
      background: rgba(0,255,255,0.04);
      border: 1px solid rgba(0,255,65,0.15);
      text-transform: uppercase;
      white-space: nowrap;
    }

    td {
      padding: 8px 14px;
      font-size: 0.82rem;
      border: 1px solid rgba(0,255,65,0.1);
      color: #a0c8a0;
      vertical-align: middle;
      white-space: normal;
      word-wrap: break-word;
    }

    tbody tr {
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: rgba(0,255,65,0.04);
    }

    tbody tr:hover td {
      color: var(--green);
    }

    td a {
      color: var(--green);
      text-decoration: none;
      text-shadow: 0 0 5px rgba(0,255,65,0.5);
      transition: all 0.15s;
    }

    td a:hover {
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan);
      text-decoration: underline;
    }

    /* LEVEL BADGES */
    .badge-easy   { color: var(--green); border: 1px solid var(--green-dim); padding: 1px 6px; font-size: 0.75rem; }
    .badge-medium { color: var(--amber); border: 1px solid rgba(255,176,0,0.4); padding: 1px 6px; font-size: 0.75rem; }
    .badge-hard   { color: #ff4444; border: 1px solid rgba(255,68,68,0.4); padding: 1px 6px; font-size: 0.75rem; }
    .badge-insane { color: var(--purple); border: 1px solid rgba(157,0,255,0.4); padding: 1px 6px; font-size: 0.75rem; }
    .badge-default { color: var(--green-dim); border: 1px solid var(--green-dark); padding: 1px 6px; font-size: 0.75rem; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--green-dark);
      padding: 20px 0;
      margin-top: 20px;
      color: var(--green-dark);
      font-size: 0.75rem;
      letter-spacing: 1px;
    }

    footer a { color: var(--green-dim); text-decoration: none; }
    footer a:hover { color: var(--green); text-shadow: 0 0 6px var(--green); }

    ::-webkit-scrollbar { width: 6px; height: 6px; background: #000; }
    ::-webkit-scrollbar-thumb { background: var(--green-dark); }
    ::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }

    audio { display: none; }

    @media (max-width: 600px) {
      th, td { padding: 6px 8px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="wrapper">
  <nav>
    <ul>
      <li><span class="brand">&gt; </span></li>
      <li><a href="../index.html">[ ~/Start ]</a></li>
      <li><a href="../whoami.html">[ ~/Whoami ]</a></li>
      <li><a href="./ctf.html" class="active">[ ~/CTF's ]</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <div class="prompt-line">
      <span class="user">root</span>@<span class="host">pwn</span>:<span class="path">~/ctf</span>$ ls -lt challenges/
      <span class="cursor"></span>
    </div>
  </div>

  <div class="filter-bar">
    <label for="category">&gt;&gt; CATEGORY:</label>
    <select id="category" onchange="search();"></select>
  </div>

  <div id="results"></div>

  <footer>
    <span>// &nbsp; root@pwn:~$ echo "The quieter you become, the more you are able to hear." &nbsp; // &nbsp;</span>
    <a href="https://github.com/s1kr10s" target="_blank">github</a> &nbsp;|&nbsp;
    <a href="https://x.com/s1kr10s" target="_blank">twitter/x</a> &nbsp;|&nbsp;
    <a href="https://medium.com/@s1kr10s" target="_blank">medium</a>
  </footer>
</div>

<audio id="bgm" src="./pwned.mp3" preload="auto"></audio>

<script>
  const getUniqueCategories = () => {
    const categoriesSet = new Set();
    vulnerabilities.forEach(vuln => {
      vuln.category.split('~').forEach(cat => categoriesSet.add(cat.trim()));
    });
    return Array.from(categoriesSet).sort((a, b) => a.localeCompare(b, 'en', { sensitivity: 'base' }));
  };

  const populateCategories = () => {
    const select = document.getElementById("category");
    const categories = getUniqueCategories();
    categories.forEach(cat => {
      const option = document.createElement("option");
      option.value = cat;
      option.textContent = capitalizeWords(cat);
      select.appendChild(option);
    });
    search();
  };

  const capitalizeWords = (str) => {
    return str
      .split('~')
      .map(segment =>
        segment.trim().split(' ')
          .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
          .join(' ')
      )
      .join(' ~ ');
  };

  const getLevelBadge = (level) => {
    const l = level.toLowerCase();
    if (l.includes('easy'))   return `<span class="badge-easy">${capitalizeWords(level)}</span>`;
    if (l.includes('medium')) return `<span class="badge-medium">${capitalizeWords(level)}</span>`;
    if (l.includes('hard'))   return `<span class="badge-hard">${capitalizeWords(level)}</span>`;
    if (l.includes('insane')) return `<span class="badge-insane">${capitalizeWords(level)}</span>`;
    return `<span class="badge-default">${capitalizeWords(level)}</span>`;
  };

  const search = () => {
    const selected = document.getElementById("category").value;
    const results = vulnerabilities.filter(v => v.category.includes(selected));

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = `<h2>-= ${capitalizeWords(selected)} =- &nbsp; [${results.length} challenges]</h2>`;

    if (results.length === 0) {
      resultsDiv.innerHTML += `<p style="text-align:center;color:var(--green-dim);font-size:0.85rem;">[!] No results found.</p>`;
      return;
    }

    let table = `
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Challenge Name</th>
              <th>Vulnerability / Technique</th>
              <th>Level</th>
              <th>Arch</th>
            </tr>
          </thead>
          <tbody>`;

    results.forEach(r => {
      table += `
        <tr>
          <td><a href="./chal/${r.name}.zip" target="_blank">[+] ${r.name}</a></td>
          <td>${capitalizeWords(r.category)}</td>
          <td>${getLevelBadge(r.level)}</td>
          <td>${capitalizeWords(r.arch)}</td>
        </tr>`;
    });

    table += `</tbody></table></div>`;
    resultsDiv.innerHTML += table;
  };

  // Matrix background
  function runMatrixEffect() {
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const chars = '01アイウエオカキクケコ<>{}[]\\!@#$%^&*ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const fontSize = 13;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array.from({ length: columns }).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#00ff41";
      ctx.font = fontSize + "px Share Tech Mono, monospace";
      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(draw, 50);
  }

  function playAudio() {
    const audio = document.getElementById("bgm");
    audio.volume = 0.2;
    audio.loop = true;
    audio.play().catch(() => {});
  }

  window.onload = () => {
    populateCategories();
    runMatrixEffect();
    document.body.addEventListener("click", playAudio, { once: true });
  };
</script>

</body>
</html>
